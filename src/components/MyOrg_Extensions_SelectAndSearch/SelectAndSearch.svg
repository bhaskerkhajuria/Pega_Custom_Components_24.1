<?xml version="1.0" encoding="UTF-8"?>
<svg width="100px" height="70px" viewBox="0 0 100 70" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>30 70 col</title>
    <defs>
        <rect id="path-1" x="0" y="0" width="100" height="70"></rect>
    </defs>
    <g id="Concepts" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g id="Templates" transform="translate(-98.000000, -108.000000)">
            <g id="Change-template" transform="translate(42.000000, 36.000000)">
                <g id="30-70-col" transform="translate(56.000000, 72.000000)">
                    <mask id="mask-2" fill="white">
                        <use xlink:href="#path-1"></use>
                    </mask>
                    <!-- Outer Border -->
                    <rect stroke="#A5A8BC" stroke-width="0.5" x="0.25" y="0.25" width="99.5" height="69.5"></rect>

                    <!-- Inner White Canvas -->
                    <g id="white" mask="url(#mask-2)" fill="#FFFFFF">
                        <g transform="translate(3.000000, 3.000000)" id="Rectangle">
                            <rect x="0" y="0" width="94" height="64"></rect>
                        </g>
                    </g>

                    <!-- Content Areas (30% / 70%) -->
                    <!-- Content area padding: 6px from edges (so usable area starts at x=6, y=6) -->
                    <!-- Usable content width: 88px (from 6 to 94), height: 58px (from 6 to 64) -->
                    <g id="content" mask="url(#mask-2)">
                        <!-- Left region: A (30%) -->
                        <g id="left-30" transform="translate(6.000000, 6.000000)">
                            <rect x="0" y="0" width="26.4" height="58" rx="2.5" fill="#97A0C3"></rect>
                        </g>

                        <!-- Divider (dashed) -->
                        <!-- Divider x = 6 + 26.4 = 32.4 -->
                        <g id="divider">
                            <line x1="32.4" y1="6" x2="32.4" y2="64"
                                  stroke="#94A3B8" stroke-width="1" stroke-dasharray="3 3"></line>
                        </g>

                        <!-- Right region: B (70%) -->
                        <g id="right-70" transform="translate(32.400000, 6.000000)">
                            <!-- x here is 32.4 which is the divider; give 0.8px gap to the right box (optional) -->
                            <rect x="0.8" y="0" width="60.8" height="58" rx="2.5" fill="#E2E8F0"></rect>
                        </g>
                    </g>

                    <!-- Labels -->
                    <g id="labels" mask="url(#mask-2)" font-family="OpenSans-Semibold, Open Sans" font-size="11" font-weight="500">
                        <!-- A centered in left region -->
                        <!-- Center of left box: x = 6 + 26.4/2 = 19.2, y = 6 + 58/2 = 35 -->
                        <g id="A" transform="translate(18.450000, 23.000000)">
                            <text>
                                <tspan x="0" y="12" fill="#FFFFFF">A</tspan>
                            </text>
                        </g>

                        <!-- B centered in right region -->
                        <!-- Right box x-origin ≈ 33.2 (32.4 + 0.8), width = 60.8 -->
                        <!-- Center x = 33.2 + 60.8/2 = 63.6; center y same = 35 -->
                        <g id="B" transform="translate(62.850000, 23.000000)">
                            <text>
                                <tspan x="0" y="12" fill="#334155">B</tspan>
                            </text>
                        </g>
                    </g>

                </g>
            </g>
        </g>
    </g>
</svg>
